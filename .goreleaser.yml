version: 2
project_name: tm1cli
builds:
  - main: .
    binary: tm1cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X tm1cli/cmd.Version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
checksum:
  name_template: "checksums.txt"
release:
  github:
    owner: hsubebe89
    name: tm1cli
  draft: false
  prerelease: auto
