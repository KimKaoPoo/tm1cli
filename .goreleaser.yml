version: 2
project_name: tm1cli
builds:
  - main: .
    binary: tm1cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X tm1cli/cmd.Version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
checksum:
  name_template: "checksums.txt"
release:
  github:
    owner: KimKaoPoo
    name: tm1cli
  draft: false
  prerelease: auto
brews:
  - name: tm1cli
    repository:
      owner: KimKaoPoo
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: https://github.com/KimKaoPoo/tm1cli
    description: CLI tool for IBM TM1/Planning Analytics REST API
    license: MIT
    install: |
      bin.install "tm1cli"
    test: |
      system "#{bin}/tm1cli", "version"
